    <circle cx="275" cy="300" r="2"/>
    <circle cx="325" cy="300" r="2"/>
    <circle cx="282" cy="282" r="2"/>
    <circle cx="318" cy="282" r="2"/>
    <circle cx="282" cy="318" r="2"/>
    <circle cx="318" cy="318" r="2"/>
