<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      .l { fill:none; stroke:#6F1028; stroke-width:1.5 }
      .lf { fill:#6F1028; opacity:0.35 }
    </style>
  </defs>
  <!-- Outermost ring -->
  <circle cx="400" cy="400" r="380" class="l" opacity="0.3"/>
  <circle cx="400" cy="400" r="370" class="l" opacity="0.25"/>
  <circle cx="400" cy="400" r="360" class="l" opacity="0.2"/>
  <!-- Large petals -->
  <g class="lf">
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(0 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(30 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(60 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(90 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(120 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(150 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(180 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(210 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(240 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(270 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(300 400 400)"/>
    <ellipse cx="400" cy="30" rx="18" ry="60" transform="rotate(330 400 400)"/>
  </g>
  <!-- Inner ring -->
  <circle cx="400" cy="400" r="300" class="l" opacity="0.3"/>
  <circle cx="400" cy="400" r="290" class="l" opacity="0.25"/>
  <!-- Medium petals -->
  <g class="lf">
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(15 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(45 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(75 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(105 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(135 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(165 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(195 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(225 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(255 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(285 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(315 400 400)"/>
    <ellipse cx="400" cy="120" rx="14" ry="45" transform="rotate(345 400 400)"/>
  </g>
  <!-- Inner ring -->
  <circle cx="400" cy="400" r="200" class="l" opacity="0.35"/>
  <circle cx="400" cy="400" r="190" class="l" opacity="0.3"/>
  <!-- Small inner petals -->
  <g class="lf">
    <ellipse cx="400" cy="220" rx="10" ry="30" transform="rotate(0 400 400)"/>
    <ellipse cx="400" cy="220" rx="10" ry="30" transform="rotate(60 400 400)"/>
    <ellipse cx="400" cy="220" rx="10" ry="30" transform="rotate(120 400 400)"/>
    <ellipse cx="400" cy="220" rx="10" ry="30" transform="rotate(180 400 400)"/>
    <ellipse cx="400" cy="220" rx="10" ry="30" transform="rotate(240 400 400)"/>
    <ellipse cx="400" cy="220" rx="10" ry="30" transform="rotate(300 400 400)"/>
  </g>
  <!-- Center rings -->
  <circle cx="400" cy="400" r="100" class="l" opacity="0.4"/>
  <circle cx="400" cy="400" r="90" class="l" opacity="0.35"/>
  <circle cx="400" cy="400" r="80" class="l" opacity="0.3"/>
  <circle cx="400" cy="400" r="40" class="l" opacity="0.4"/>
  <circle cx="400" cy="400" r="30" class="l" opacity="0.35"/>
  <circle cx="400" cy="400" r="20" class="l" opacity="0.4"/>
  <!-- Decorative dots around outer ring -->
  <g fill="#6F1028" opacity="0.3">
    <circle cx="400" cy="25" r="4" transform="rotate(0 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(20 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(40 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(60 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(80 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(100 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(120 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(140 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(160 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(180 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(200 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(220 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(240 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(260 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(280 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(300 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(320 400 400)"/>
    <circle cx="400" cy="25" r="4" transform="rotate(340 400 400)"/>
  </g>
</svg>