    <circle cx="160" cy="160" r="2.5"/>
    <circle cx="440" cy="160" r="2.5"/>
    <circle cx="160" cy="440" r="2.5"/>
    <circle cx="440" cy="440" r="2.5"/>
    <circle cx="200" cy="200" r="2"/>
    <circle cx="400" cy="200" r="2"/>
    <circle cx="200" cy="400" r="2"/>
    <circle cx="400" cy="400" r="2"/>
